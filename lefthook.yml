pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{js,ts,jsx,tsx}"
      run: bunx oxlint {staged_files}
    format:
      glob: "*.{js,ts,jsx,tsx,json,css,md,yaml,yml}"
      run: bunx oxfmt --check {staged_files}
    typecheck-web:
      root: "apps/web/"
      run: bunx tsc --noEmit
    typecheck-ui:
      root: "packages/ui/"
      run: bunx tsc --noEmit
